{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div class="page-header-left">
    <h2>Add Purchase</h2>
    <p>Record a new purchase from a seller.</p>
  </div>
  <div class="page-header-right">
    <a class="btn btn-ghost btn-sm" href="/purchases">← Back</a>
  </div>
</div>

<div class="card" style="max-width:780px;">
  <div class="card-title">Purchase Details</div>
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="purchase_date" value="{{ today }}" required>
      </div>
      <div class="form-group">
        <label>Seller *</label>
        <select name="seller_id" required>
          <option value="">— Select Seller —</option>
          {% for s in sellers %}
            <option value="{{ s.id }}">{{ s.name }}{% if s.phone %} · {{ s.phone }}{% endif %}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Payment Method</label>
        <select name="payment_method">
          <option value="">— Select —</option>
          {% for m in ["Cash","UPI","Cheque","UTR","NEFT","RTGS"] %}
            <option>{{ m }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Payment Reference</label>
        <input name="payment_ref" placeholder="UTR / Cheque No. / UPI Ref">
      </div>
      <div class="form-group">
        <label>Bill No.</label>
        <input name="bill_no" placeholder="Optional">
      </div>
      <div class="form-group">
        <label>Amount (₹) *</label>
        <input type="number" step="0.01" min="0" name="amount" required placeholder="0.00">
      </div>
      <div class="form-group span-2">
        <label>Product Description</label>
        <textarea name="product_description" placeholder="Paper, ink, flex, lamination…"></textarea>
      </div>
      <div class="form-group span-2">
        <label>Notes</label>
        <textarea name="notes" placeholder="Any additional notes…"></textarea>
      </div>
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button type="submit" class="btn btn-primary">Save Purchase</button>
      <a href="/purchases" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
