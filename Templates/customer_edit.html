{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div class="page-header-left">
    <h2>Edit Customer</h2>
    <p>Update customer details.</p>
  </div>
  <div class="page-header-right">
    <a class="btn btn-ghost btn-sm" href="/customers">← Back</a>
  </div>
</div>

<div class="card" style="max-width:560px;">
  <div class="card-title">Customer Details</div>
  <form method="POST">
    <div class="form-grid form-grid-1">
      <div class="form-group">
        <label>Name *</label>
        <input name="name" value="{{ c.name }}" required>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input name="phone" value="{{ c.phone or '' }}">
      </div>
      <div class="form-group">
        <label>Address</label>
        <textarea name="address">{{ c.address or '' }}</textarea>
      </div>
      <div class="form-group">
        <label>GST No.</label>
        <input name="gst_no" value="{{ c.gst_no or '' }}">
      </div>
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button type="submit" class="btn btn-primary">Update Customer</button>
      <a href="/customers" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
