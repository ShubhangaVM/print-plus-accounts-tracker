{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div class="page-header-left">
    <h2>Add Sale</h2>
    <p>Create a new bill entry for a customer.</p>
  </div>
  <div class="page-header-right">
    <a class="btn btn-ghost btn-sm" href="/sales">← Back to Sales</a>
  </div>
</div>

<div class="card" style="max-width:780px;">
  <div class="card-title">Bill Details</div>
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="sale_date" value="{{ today }}" required>
      </div>
      <div class="form-group">
        <label>Customer *</label>
        <select name="customer_id" required>
          <option value="">— Select Customer —</option>
          {% for c in customers %}
            <option value="{{ c.id }}">{{ c.name }}{% if c.phone %} · {{ c.phone }}{% endif %}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Bill No. *</label>
        <input name="bill_no" required placeholder="e.g. INV-001">
      </div>
      <div class="form-group">
        <label>Total Amount (₹) *</label>
        <input type="number" step="0.01" min="0" name="amount" required placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Paid Amount (₹)</label>
        <input type="number" step="0.01" min="0" name="paid_amount" value="0" placeholder="0.00">
      </div>
      <div class="form-group span-2">
        <label>Notes / Description</label>
        <textarea name="notes" placeholder="Order details, product description…"></textarea>
      </div>
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button type="submit" class="btn btn-primary">Save Sale</button>
      <a href="/sales" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
